<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HISA - Insight do Dia</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h1 { color: #2c3e50; font-size: 1.5rem; }
        .tag { background: #e1f5fe; color: #01579b; padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
        .btn { display: block; width: 100%; padding: 15px; background: #007bff; color: white; text-align: center; border-radius: 8px; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <span class="tag">CIÊNCIA COGNITIVA</span>
        <h1>{{ titulo }}</h1>
        <p><strong>Gatilhos:</strong> {{ gatilhos|join(', ') }}</p>
        <p><em>{{ desafio }}</em></p>
        <a href="#" class="btn" onclick="alert('Ofensiva mantida! Amanhã tem mais.')">Concluir Meta Diária</a>
    </div>
</body>
</html>
